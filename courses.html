<!DOCTYPE html>
<html>
<head>
  <title>Course Management</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<script src="script.js"></script>
<div class="container">
  <h1>Course Management</h1>

  <a href="dashboard.html">
    <button class="back">⬅ Back</button>
  </a>

  <!-- ADD COURSE -->
  <div class="box">
    <h3>Add Course</h3>

    <input type="text" id="courseName" placeholder="Course Name">
    <input type="text" id="category" placeholder="Category">

    <button onclick="addCourse()">Add Course</button>
  </div>

  <!-- SEARCH + FILTER -->
  <div class="box">
    <h3>Search & Filter</h3>

    <input type="text" id="search" placeholder="Search course">

   <input type="text" id="filter" placeholder="Enter category (e.g. mpc, bipc)">

<button onclick="applySearchAndFilter()">Apply</button>
<button onclick="clearFilter()">Clear</button>
  </div>

  <!-- COURSE LIST -->
  <div id="courseList" class="course-grid"></div>

</div>

</body>
</html>
